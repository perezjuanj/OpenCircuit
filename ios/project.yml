name: OpenCircuit
options:
  bundleIdPrefix: com.standardsoftwaresolutions
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

# Project-wide version/build — SINGLE SOURCE OF TRUTH, inherited by BOTH the app and the
# WorkoutWidget extension. Bump CURRENT_PROJECT_VERSION here for every TestFlight upload
# (ship-release does this). Keeping it project-level (not per-target) guarantees the app and its
# embedded extension always share the SAME CFBundleVersion — App Store validation REJECTS an upload
# whose extension build number differs from the app's. Both Info.plists reference these via
# $(MARKETING_VERSION)/$(CURRENT_PROJECT_VERSION).
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "25"

packages:
  OpenCircuitKit:
    path: OpenCircuitKit

targets:
  OpenCircuit:
    type: application
    platform: iOS
    sources:
      - path: OpenCircuit
      # Shared/ holds WorkoutActivityAttributes — the ActivityKit contract compiled into BOTH the
      # app (starts/updates the Live Activity) and the WorkoutWidget extension (renders it).
      - path: Shared
    dependencies:
      - package: OpenCircuitKit
        product: OpenCircuitKit
      # Embed the Live Activity / Dynamic Island widget extension into the app's PlugIns.
      - target: WorkoutWidget
        embed: true
    info:
      path: OpenCircuit/Info.plist
      properties:
        UILaunchScreen: {}
        # User-facing app name (home screen, Settings). Independent of PRODUCT_NAME / bundle id,
        # which stay "OpenCircuit"/com.standardsoftwaresolutions.opencircuit internally (#100 rebrand).
        CFBundleDisplayName: OpenCircuit
        # Version/build come from the build settings below (single source of truth). XcodeGen
        # generates this Info.plist, so these MUST live here, not be hand-edited into the plist.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Export compliance: only crypto is SM3 hashing for ring auth (exempt) → declare no
        # non-exempt encryption, so TestFlight uploads skip the manual compliance prompt.
        ITSAppUsesNonExemptEncryption: false
        # Diagnostics export (Device Info ▸ Diagnostics): expose the app's Documents dir over
        # iTunes/Finder file sharing + the Files app, so tester logs can be pulled off-device.
        # MUST live here — XcodeGen regenerates Info.plist and would otherwise strip these.
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        # HealthKit auth strings (Phase 4) — required or the app crashes on request. Shown verbatim
        # in the iOS permission dialogs, so they use the user-facing name "OpenCircuit".
        NSHealthShareUsageDescription: "OpenCircuit reads health metrics from your ring to display them."
        NSHealthUpdateUsageDescription: "OpenCircuit writes your ring's metrics into Apple Health."
        # Live Activities (workout modal): required for the app to start an ActivityKit Live Activity
        # showing live workout time / calories / heart rate on the Lock Screen + Dynamic Island.
        NSSupportsLiveActivities: true
        # BLE (Phase 3) — required to connect to the ring.
        NSBluetoothAlwaysUsageDescription: "OpenCircuit connects to your RingConn Gen 2 ring over Bluetooth Low Energy."
        # Location (Phase 3, #75) — used ONLY during an active workout: to map the GPS route
        # (outdoor; the ring has no GPS) AND, with the `location` background mode below, to keep
        # the app alive so heart-rate recording continues while the phone is locked. Not used at
        # any other time. The `location` background mode is REQUIRED before setting
        # allowsBackgroundLocationUpdates=true at runtime, or CoreLocation throws.
        NSLocationWhenInUseUsageDescription: "OpenCircuit uses your location during an active workout to map outdoor routes and to keep recording your heart rate while your phone is locked. It is never used outside of a workout."
        # Background sync while suspended (docs/HANDOFF_MACOS_IOS.md). `processing` enables the
        # BGProcessingTask (longer runtime) so the optical-HR poll can clear its ~60 s warm-up in
        # the background (#45/#50 follow-up). iOS still runs it at its discretion, so this is
        # best-effort — not a guarantee of daytime background HR. `location` keeps a foreground-
        # started workout alive in the background (the BLE poll loops are Task.sleep loops that
        # iOS otherwise freezes on suspend).
        UIBackgroundModes:
          - bluetooth-central
          - location
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.standardsoftwaresolutions.opencircuit.bgrefresh
          - com.standardsoftwaresolutions.opencircuit.bgprocessing
    # HealthKit entitlement enabled (2026-06-15) — signed under the paid Standard Software Solutions team
    # (DEVELOPMENT_TEAM below). The App ID com.standardsoftwaresolutions.opencircuit carries the HealthKit
    # capability in that account; automatic signing registers it on first build.
    entitlements:
      path: OpenCircuit/OpenCircuit.entitlements
      properties: { com.apple.developer.healthkit: true }
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.standardsoftwaresolutions.opencircuit
        # MARKETING_VERSION / CURRENT_PROJECT_VERSION are defined at PROJECT level (top of this file)
        # so the app and the WorkoutWidget extension always share one build number. The app's
        # Info.plist references them via $(MARKETING_VERSION)/$(CURRENT_PROJECT_VERSION).
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        # App icon lives in OpenCircuit/Assets.xcassets/AppIcon.appiconset (single 1024px icon,
        # iOS 17 single-size format). Set explicitly so CLI/device builds assign it after xcodegen.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # On-device signing. Set here so CLI device builds work after `xcodegen generate`
        # (which would otherwise drop the team and fail signing). Team 765RD9BJ8C =
        # S&S Holdings International LLC (DBA Standard Software Solutions); paid, HealthKit-capable.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 765RD9BJ8C

  # WidgetKit app-extension that renders the workout Live Activity (Lock Screen + Dynamic Island).
  # It has NO OpenCircuitKit dependency on purpose: the only shared code is Shared/ (the ActivityKit
  # attributes), everything else is system frameworks (WidgetKit/SwiftUI/ActivityKit). The app
  # embeds it via the `WorkoutWidget` dependency above and drives it through ActivityKit.
  WorkoutWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: WorkoutWidget
      - path: Shared
    info:
      path: WorkoutWidget/Info.plist
      properties:
        CFBundleDisplayName: OpenCircuit Workout
        # MUST match the app's version/build (project-level settings) — App Store validation rejects
        # an extension whose CFBundleVersion differs from the containing app's.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.standardsoftwaresolutions.opencircuit.WorkoutWidget
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        # Same paid team as the app so automatic signing registers the extension's App ID and the
        # embedded extension is signed consistently for device builds / TestFlight.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 765RD9BJ8C

  OpenCircuitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OpenCircuitTests
    dependencies:
      - target: OpenCircuit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.standardsoftwaresolutions.opencircuit.tests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES

# Shared scheme for the app target so `xcodebuild -scheme OpenCircuit` (CLI device
# build/run) works after `xcodegen generate` — XcodeGen does not auto-create one.
schemes:
  OpenCircuit:
    build:
      targets:
        OpenCircuit: all
        WorkoutWidget: all
        OpenCircuitTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - OpenCircuitTests
