name: OpenCircuit
options:
  bundleIdPrefix: com.dreamality
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  OpenCircuitKit:
    path: OpenCircuitKit

targets:
  OpenCircuit:
    type: application
    platform: iOS
    sources:
      - path: OpenCircuit
    dependencies:
      - package: OpenCircuitKit
        product: OpenCircuitKit
    info:
      path: OpenCircuit/Info.plist
      properties:
        UILaunchScreen: {}
        # User-facing app name (home screen, Settings). Independent of PRODUCT_NAME / bundle id,
        # which stay "OpenCircuit"/com.dreamality.opencircuit internally (#100 rebrand).
        CFBundleDisplayName: OpenCircuit
        # HealthKit auth strings (Phase 4) — required or the app crashes on request. Shown verbatim
        # in the iOS permission dialogs, so they use the user-facing name "OpenCircuit".
        NSHealthShareUsageDescription: "OpenCircuit reads health metrics from your ring to display them."
        NSHealthUpdateUsageDescription: "OpenCircuit writes your ring's metrics into Apple Health."
        # BLE (Phase 3) — required to connect to the ring.
        NSBluetoothAlwaysUsageDescription: "OpenCircuit connects to your RingConn Gen 2 ring over Bluetooth Low Energy."
        # Location (Phase 3, #75) — used ONLY during an active workout: to map the GPS route
        # (outdoor; the ring has no GPS) AND, with the `location` background mode below, to keep
        # the app alive so heart-rate recording continues while the phone is locked. Not used at
        # any other time. The `location` background mode is REQUIRED before setting
        # allowsBackgroundLocationUpdates=true at runtime, or CoreLocation throws.
        NSLocationWhenInUseUsageDescription: "OpenCircuit uses your location during an active workout to map outdoor routes and to keep recording your heart rate while your phone is locked. It is never used outside of a workout."
        # Background sync while suspended (docs/HANDOFF_MACOS_IOS.md). `processing` enables the
        # BGProcessingTask (longer runtime) so the optical-HR poll can clear its ~60 s warm-up in
        # the background (#45/#50 follow-up). iOS still runs it at its discretion, so this is
        # best-effort — not a guarantee of daytime background HR. `location` keeps a foreground-
        # started workout alive in the background (the BLE poll loops are Task.sleep loops that
        # iOS otherwise freezes on suspend).
        UIBackgroundModes:
          - bluetooth-central
          - location
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.dreamality.opencircuit.bgrefresh
          - com.dreamality.opencircuit.bgprocessing
    # HealthKit entitlement enabled (2026-06-15) — signed under the paid Dreamality team
    # (DEVELOPMENT_TEAM below). The App ID com.dreamality.opencircuit carries the HealthKit
    # capability in that account; automatic signing registers it on first build.
    entitlements:
      path: OpenCircuit/OpenCircuit.entitlements
      properties: { com.apple.developer.healthkit: true }
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dreamality.opencircuit
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        # On-device signing. Set here so CLI device builds work after `xcodegen generate`
        # (which would otherwise drop the team and fail signing). Dreamality paid team
        # (was personal/free 64R56NUZ5P; switched 2026-06-15 to enable HealthKit).
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 2ZH5MPQ5G6

  OpenCircuitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OpenCircuitTests
    dependencies:
      - target: OpenCircuit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dreamality.opencircuit.tests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
